<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OGE · Invoice Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════════ */
:root {
  --obsidian: #080809;
  --obsidian2: #0f0f11;
  --obsidian3: #161618;
  --obsidian4: #1e1e21;
  --obsidian5: #26262a;
  --border: #2a2a2e;
  --border2: #353538;
  --gold: #D4AF87;
  --gold2: #c49a6c;
  --gold-dim: rgba(212,175,135,0.15);
  --gold-glow: rgba(212,175,135,0.08);
  --red: #CC2200;
  --red2: #a81b00;
  --green: #2a7a4a;
  --green2: #1e5c37;
  --white: #F0F0F2;
  --muted: #888890;
  --muted2: #606068;
  --radius: 6px;
  --radius2: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow2: 0 8px 40px rgba(0,0,0,0.7);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--obsidian2);
  color: var(--white);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
#root { display: flex; height: 100vh; }

/* NAV SIDEBAR */
#nav {
  width: 220px;
  min-width: 220px;
  background: var(--obsidian);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}
.nav-brand {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
}
.nav-brand .wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.nav-brand .sub {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}
.nav-menu { flex: 1; padding: 12px 0; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.2px;
  transition: all .15s;
  position: relative;
  border-left: 2px solid transparent;
}
.nav-item:hover { color: var(--white); background: var(--obsidian3); }
.nav-item.active {
  color: var(--gold);
  background: var(--gold-glow);
  border-left-color: var(--gold);
}
.nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
.nav-badge {
  margin-left: auto;
  background: var(--obsidian5);
  color: var(--muted);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  min-width: 22px;
  text-align: center;
}
.nav-item.active .nav-badge { background: var(--gold-dim); color: var(--gold); }
.nav-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted2);
}

/* MAIN CONTENT */
#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  height: 56px;
  min-height: 56px;
  background: var(--obsidian);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
}
.topbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--white);
  flex: 1;
}
.topbar-title span { color: var(--muted); font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 400; margin-left: 8px; }
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 28px;
}

/* ═══════════════════════════════════════════════
   COMPONENTS
═══════════════════════════════════════════════ */

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 18px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  transition: all .15s;
  white-space: nowrap;
  text-decoration: none;
}
.btn:hover { opacity: .88; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-gold { background: var(--gold); color: var(--obsidian); }
.btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--white); }
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }
.btn-ghost { background: transparent; color: var(--muted); }
.btn-ghost:hover { color: var(--white); background: var(--obsidian4); }
.btn-red { background: var(--red); color: #fff; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon { padding: 7px; width: 34px; height: 34px; justify-content: center; }

/* INPUTS */
.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.field input, .field textarea, .field select {
  width: 100%;
  background: var(--obsidian3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-glow);
}
.field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.field select option { background: var(--obsidian3); }
.field-row { display: grid; gap: 14px; }
.field-row.col2 { grid-template-columns: 1fr 1fr; }
.field-row.col3 { grid-template-columns: 1fr 1fr 1fr; }

/* CARDS */
.card {
  background: var(--obsidian3);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: hidden;
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-title { font-weight: 600; font-size: 14px; flex: 1; }
.card-body { padding: 20px; }

/* STATS */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--obsidian3);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--gold), transparent);
}
.stat-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: var(--white); }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.stat-icon { position: absolute; top: 18px; right: 18px; font-size: 22px; opacity: .15; }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.data-table td {
  padding: 13px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}
.data-table tbody tr { transition: background .1s; }
.data-table tbody tr:hover { background: var(--obsidian4); cursor: pointer; }
.data-table tbody tr:last-child td { border-bottom: none; }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.badge-paid { background: rgba(42,122,74,0.2); color: #4ecf7a; border: 1px solid rgba(42,122,74,0.3); }
.badge-sent { background: rgba(212,175,135,0.15); color: var(--gold); border: 1px solid rgba(212,175,135,0.25); }
.badge-draft { background: var(--obsidian5); color: var(--muted); border: 1px solid var(--border2); }
.badge-overdue { background: rgba(204,34,0,0.15); color: #ff5533; border: 1px solid rgba(204,34,0,0.25); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn .15s ease;
}
.modal {
  background: var(--obsidian3);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  box-shadow: var(--shadow2);
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp .2s ease;
}
.modal-sm { max-width: 480px; }
.modal-md { max-width: 680px; }
.modal-lg { max-width: 900px; }
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky; top: 0;
  background: var(--obsidian3);
  z-index: 1;
}
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; flex: 1; }
.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
.empty-state h3 { color: var(--white); margin-bottom: 6px; font-size: 16px; }
.empty-state p { font-size: 13px; }

/* SEARCH BAR */
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.search-input-wrap {
  flex: 1;
  position: relative;
}
.search-input-wrap input {
  width: 100%;
  background: var(--obsidian3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 9px 12px 9px 36px;
  outline: none;
  transition: border-color .15s;
}
.search-input-wrap input:focus { border-color: var(--gold); }
.search-input-wrap .search-icon {
  position: absolute;
  left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--muted);
  font-size: 14px;
  pointer-events: none;
}

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

/* ═══════════════════════════════════════════════
   INVOICE EDITOR
═══════════════════════════════════════════════ */
.editor-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}
.editor-panel { display: flex; flex-direction: column; gap: 0; }
.editor-section {
  background: var(--obsidian3);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  margin-bottom: 14px;
  overflow: hidden;
}
.editor-section-header {
  padding: 12px 16px;
  background: var(--obsidian4);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.editor-section-header .toggle { margin-left: auto; color: var(--muted); font-size: 12px; }
.editor-section-body { padding: 16px; }

/* LINE ITEMS */
.item-row {
  background: var(--obsidian4);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  position: relative;
}
.item-row-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.item-num-badge {
  background: var(--gold-dim);
  color: var(--gold);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: 0.5px;
}
.item-title-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 4px 0;
  outline: none;
  transition: border-color .15s;
}
.item-title-input:focus { border-bottom-color: var(--gold); }
.item-row-nums { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.mini-field label { font-size: 10px; color: var(--muted2); display: block; margin-bottom: 3px; }
.mini-field input {
  width: 100%;
  background: var(--obsidian3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 6px 10px;
  outline: none;
  transition: border-color .15s;
}
.mini-field input:focus { border-color: var(--gold); }
.mini-field input.amount-field { color: var(--gold); font-weight: 600; }
.remove-item-btn {
  position: absolute; top: 10px; right: 10px;
  background: none; border: none; color: var(--muted2);
  cursor: pointer; font-size: 16px;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
  transition: all .15s;
}
.remove-item-btn:hover { color: #ff5533; background: rgba(204,34,0,.1); }
.add-item-btn {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: var(--radius);
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  font-family: 'DM Sans', sans-serif;
}
.add-item-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-glow); }

/* TOTALS MINI */
.totals-mini {
  background: var(--obsidian4);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-top: 10px;
}
.totals-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 13px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.totals-row:last-child { border-bottom: none; padding-top: 10px; }
.totals-row.grand { color: var(--gold); font-weight: 700; font-size: 16px; }
.totals-row span:last-child { font-weight: 600; }

/* PREVIEW PANEL */
.preview-panel-wrap {
  position: sticky;
  top: 0;
  max-height: calc(100vh - 112px);
  overflow-y: auto;
}
.preview-scale-wrap {
  transform-origin: top left;
  width: 900px;
}

/* ═══════════════════════════════════════════════
   INVOICE DOCUMENT (print-accurate)
═══════════════════════════════════════════════ */
.inv-doc {
  background: #fff;
  color: #1a1a1e;
  font-family: 'DM Sans', sans-serif;
  width: 900px;
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
  border-radius: 2px;
}
.inv-doc .inv-hdr {
  background: #080809;
  padding: 36px 46px 28px;
  display: flex;
  align-items: flex-start;
  gap: 28px;
}
.inv-doc .inv-logo { width: 100px; height: auto; flex-shrink: 0; }
.inv-doc .inv-hdr-text { flex: 1; }
.inv-doc .inv-hdr-text h1 {
  margin: 0 0 5px;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: #D4AF87;
}
.inv-doc .inv-hdr-text p { margin: 0; font-size: 13px; color: #D4AF87; opacity: .8; }
.inv-doc .inv-hdr-info {
  text-align: right;
  font-size: 13px;
  line-height: 1.9;
  color: #D4AF87;
}
.inv-doc .inv-hdr-info strong { color: #D4AF87; opacity: .6; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; display: block; }
.inv-doc .inv-hdr-info .val { font-weight: 600; font-size: 14px; }
.inv-doc .inv-body { padding: 36px 46px; }
.inv-doc .inv-addrs { display: flex; gap: 0; margin-bottom: 26px; }
.inv-doc .inv-addr { flex: 1; font-size: 13px; line-height: 1.75; color: #1a1a1e; }
.inv-doc .inv-addr:last-child { text-align: right; }
.inv-doc .inv-addr strong { font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; color: #888; display: block; margin-bottom: 4px; }
.inv-doc .inv-pay { font-size: 13px; line-height: 1.8; color: #333; margin-bottom: 24px; background: #f8f8f8; padding: 14px 16px; border-radius: 4px; }
.inv-doc .inv-pay strong { color: #080809; }
.inv-doc table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
.inv-doc table th {
  background: #D4AF87;
  color: #080809;
  padding: 12px 11px;
  text-align: left;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.inv-doc table td { padding: 12px 11px; border-bottom: 1px solid #ebebeb; font-size: 13px; vertical-align: top; }
.inv-doc table td small { display: block; font-size: 11px; color: #888; margin-top: 3px; line-height: 1.5; }
.inv-doc .totals-tbl { width: 42%; margin-left: auto; font-size: 14px; }
.inv-doc .totals-tbl td { padding: 9px 11px; border-bottom: 1px solid #f0f0f0; }
.inv-doc .totals-tbl tr:last-child td { background: #f5f5f5; font-weight: 700; border-bottom: none; }
.inv-doc .totals-tbl td:last-child { text-align: right; }
.inv-doc .inv-footnotes { font-size: 12px; line-height: 1.7; color: #555; margin-top: 18px; }
.inv-doc .inv-footnotes p { margin-bottom: 8px; }
.inv-doc .inv-footnotes strong { color: #222; }
.inv-doc .inv-ftr {
  background: #080809;
  color: #D4AF87;
  padding: 18px 46px;
  font-size: 11px;
  text-align: center;
  line-height: 1.8;
  opacity: .9;
}

/* ═══════════════════════════════════════════════
   PRINT
═══════════════════════════════════════════════ */
@media print {
  body { background: white; overflow: visible; }
  #root { display: block; }
  #nav, .topbar, .editor-panel, .preview-panel-wrap > .btn, #print-bar { display: none !important; }
  .content-area { padding: 0; overflow: visible; }
  .editor-layout { display: block; }
  .preview-scale-wrap { transform: none !important; width: 100% !important; }
  .inv-doc { box-shadow: none; width: 100%; }
  .preview-panel-wrap { max-height: none; overflow: visible; position: static; }
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
#toast-container {
  position: fixed;
  bottom: 24px; right: 24px;
  z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--obsidian4);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--gold);
  color: var(--white);
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  box-shadow: var(--shadow);
  animation: slideIn .2s ease;
  max-width: 320px;
}
.toast.success { border-left-color: #4ecf7a; }
.toast.error { border-left-color: #ff5533; }
@keyframes slideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* CONFIRM DIALOG */
.confirm-dialog {
  background: var(--obsidian4);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 24px;
  max-width: 380px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow2);
}
.confirm-dialog h3 { margin-bottom: 8px; }
.confirm-dialog p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.confirm-dialog .actions { display: flex; gap: 10px; justify-content: center; }

/* DROPDOWN */
.dropdown { position: relative; display: inline-block; }
.dropdown-menu {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--obsidian4);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  min-width: 160px;
  box-shadow: var(--shadow);
  z-index: 200;
  overflow: hidden;
  animation: fadeIn .1s ease;
}
.dropdown-item {
  padding: 9px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: background .1s;
  display: flex; align-items: center; gap: 8px;
  color: var(--white);
}
.dropdown-item:hover { background: var(--obsidian5); }
.dropdown-item.danger { color: #ff5533; }

/* FILTER TABS */
.filter-tabs { display: flex; gap: 4px; margin-bottom: 18px; }
.filter-tab {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  color: var(--muted);
  transition: all .15s;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
}
.filter-tab:hover { color: var(--white); }
.filter-tab.active { background: var(--gold-dim); border-color: rgba(212,175,135,0.3); color: var(--gold); }
</style>
</head>
<body>

<div id="root">
  <!-- NAV -->
  <nav id="nav">
    <div class="nav-brand">
      <div class="wordmark">OGE</div>
      <div class="sub">Invoice Manager</div>
    </div>
    <div class="nav-menu">
      <div class="nav-item active" data-view="dashboard" onclick="navigate('dashboard')">
        <span class="icon">◈</span> Dashboard
      </div>
      <div class="nav-item" data-view="invoices" onclick="navigate('invoices')">
        <span class="icon">◻</span> Invoices
        <span class="nav-badge" id="badge-invoices">0</span>
      </div>
      <div class="nav-item" data-view="clients" onclick="navigate('clients')">
        <span class="icon">◎</span> Clients
        <span class="nav-badge" id="badge-clients">0</span>
      </div>
      <div class="nav-item" data-view="new-invoice" onclick="navigate('new-invoice')">
        <span class="icon">✦</span> New Invoice
      </div>
    </div>
    <div class="nav-footer">v2.0 · Obsidian Global Events<br>office@oge.ae</div>
  </nav>

  <!-- MAIN -->
  <div id="main">
    <div class="topbar">
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div id="topbar-actions"></div>
    </div>
    <div class="content-area" id="content-area"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════
const DB = {
  save() {
    localStorage.setItem('oge_clients', JSON.stringify(this.clients));
    localStorage.setItem('oge_invoices', JSON.stringify(this.invoices));
    localStorage.setItem('oge_settings', JSON.stringify(this.settings));
  },
  load() {
    try { this.clients = JSON.parse(localStorage.getItem('oge_clients')) || []; } catch(e) { this.clients = []; }
    try { this.invoices = JSON.parse(localStorage.getItem('oge_invoices')) || []; } catch(e) { this.invoices = []; }
    try { this.settings = JSON.parse(localStorage.getItem('oge_settings')) || this.defaultSettings(); } catch(e) { this.settings = this.defaultSettings(); }
  },
  defaultSettings() {
    return {
      companyName: 'Obsidian Global Events LLC',
      companyLine2: 'Event & Marketing Agency',
      address: 'Meydan Free Zone, Meydan Grandstand, 6th Floor\nMeydan Road, Nad Al Sheba 1, Dubai, UAE',
      email: 'office@oge.ae',
      website: 'www.oge.ae',
      license: 'MFZCO-2025-00123',
      trn: 'XXXXXXX',
      bankName: 'WIO Bank PJSC',
      iban: 'AE XX XXXX XXXX XXXX XXXX XXX',
      swift: 'XXXXXXXX',
      currencies: 'EUR • USD • AED',
      paymentTerms: 14,
      defaultCurrency: 'EUR',
      logoUrl: 'https://obsidian-create.github.io/oge-invoice/logo.png',
      invoicePrefix: 'OGE',
      nextNumber: 1
    };
  },
  clients: [],
  invoices: [],
  settings: null,
  nextInvoiceNumber() {
    const n = this.settings.nextNumber || 1;
    const year = new Date().getFullYear();
    return `${this.settings.invoicePrefix}-${year}-${String(n).padStart(3,'0')}`;
  },
  incrementNumber() {
    this.settings.nextNumber = (this.settings.nextNumber || 1) + 1;
    this.save();
  },
  totalRevenue() {
    return this.invoices.filter(i => i.status === 'paid').reduce((s, i) => s + i.total, 0);
  },
  totalOutstanding() {
    return this.invoices.filter(i => i.status === 'sent').reduce((s, i) => s + i.total, 0);
  }
};
DB.load();
if (!DB.settings) DB.settings = DB.defaultSettings();

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(val, locale='en-GB') {
  if (!val) return '—';
  const d = new Date(val + (val.includes('T') ? '' : 'T00:00:00'));
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}
function fmtNum(n, decimals=2) {
  return Number(n||0).toLocaleString('de-DE', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function today() { return new Date().toISOString().split('T')[0]; }
function addDays(d, n) {
  const dt = new Date(d + 'T00:00:00');
  dt.setDate(dt.getDate() + n);
  return dt.toISOString().split('T')[0];
}
function uid() { return Math.random().toString(36).substr(2, 9); }
function toast(msg, type='') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}
function updateBadges() {
  document.getElementById('badge-invoices').textContent = DB.invoices.length;
  document.getElementById('badge-clients').textContent = DB.clients.length;
}

// ═══════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════
let currentView = 'dashboard';
let editingInvoiceId = null;
let editingClientId = null;

function navigate(view, id=null) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view || (view === 'new-invoice' && el.dataset.view === 'new-invoice') || (view === 'edit-invoice' && el.dataset.view === 'invoices'));
  });
  if (view === 'edit-invoice') editingInvoiceId = id;
  if (view === 'new-invoice') editingInvoiceId = null;
  renderView();
}

function renderView() {
  updateBadges();
  const titles = {
    dashboard: 'Dashboard',
    invoices: 'Invoices',
    clients: 'Clients',
    'new-invoice': 'New Invoice',
    'edit-invoice': 'Edit Invoice',
    settings: 'Settings'
  };
  document.getElementById('page-title').textContent = titles[currentView] || '';
  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = '';

  switch(currentView) {
    case 'dashboard': renderDashboard(); break;
    case 'invoices': renderInvoices(); break;
    case 'clients': renderClients(); break;
    case 'new-invoice': renderInvoiceEditor(null); break;
    case 'edit-invoice': renderInvoiceEditor(editingInvoiceId); break;
  }
}

// ═══════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════
function renderDashboard() {
  const inv = DB.invoices;
  const totalRevenue = DB.totalRevenue();
  const outstanding = DB.totalOutstanding();
  const draft = inv.filter(i => i.status === 'draft').length;
  const overdue = inv.filter(i => i.status === 'sent' && i.dueDate && i.dueDate < today()).length;
  const recent = [...inv].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 5);

  document.getElementById('content-area').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">◈</div>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value">${fmtNum(totalRevenue)}</div>
        <div class="stat-sub">EUR · Paid invoices</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">◻</div>
        <div class="stat-label">Outstanding</div>
        <div class="stat-value">${fmtNum(outstanding)}</div>
        <div class="stat-sub">EUR · Awaiting payment</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">◎</div>
        <div class="stat-label">Total Invoices</div>
        <div class="stat-value">${inv.length}</div>
        <div class="stat-sub">${draft} draft · ${overdue} overdue</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✦</div>
        <div class="stat-label">Clients</div>
        <div class="stat-value">${DB.clients.length}</div>
        <div class="stat-sub">Active client base</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Recent Invoices</div>
        <button class="btn btn-sm btn-outline" onclick="navigate('invoices')">View All</button>
        <button class="btn btn-sm btn-gold" onclick="navigate('new-invoice')">＋ New Invoice</button>
      </div>
      <div style="overflow-x:auto">
      ${recent.length ? `
        <table class="data-table">
          <thead><tr>
            <th>Invoice No.</th><th>Client</th><th>Date</th><th>Due</th><th>Amount</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>
            ${recent.map(inv => `
              <tr onclick="navigate('edit-invoice','${inv.id}')">
                <td style="font-weight:600;color:var(--gold)">${esc(inv.number)}</td>
                <td>${esc(inv.clientName || '—')}</td>
                <td>${fmtDate(inv.date)}</td>
                <td>${fmtDate(inv.dueDate)}</td>
                <td style="font-weight:600">${inv.currency} ${fmtNum(inv.total)}</td>
                <td>${statusBadge(inv.status, inv.dueDate)}</td>
                <td onclick="event.stopPropagation()">${invoiceActionMenu(inv)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-state"><div class="icon">◻</div><h3>No invoices yet</h3><p>Create your first invoice to get started</p></div>`}
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════
// INVOICES LIST
// ═══════════════════════════════════════════════
let invoiceFilter = 'all';
let invoiceSearch = '';

function renderInvoices() {
  let filtered = DB.invoices.filter(inv => {
    if (invoiceFilter === 'draft') return inv.status === 'draft';
    if (invoiceFilter === 'sent') return inv.status === 'sent';
    if (invoiceFilter === 'paid') return inv.status === 'paid';
    if (invoiceFilter === 'overdue') return inv.status === 'sent' && inv.dueDate < today();
    return true;
  });
  if (invoiceSearch) {
    const q = invoiceSearch.toLowerCase();
    filtered = filtered.filter(i =>
      i.number.toLowerCase().includes(q) || (i.clientName||'').toLowerCase().includes(q)
    );
  }
  filtered = [...filtered].sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-gold" onclick="navigate('new-invoice')">＋ New Invoice</button>
  `;

  document.getElementById('content-area').innerHTML = `
    <div class="filter-tabs">
      ${['all','draft','sent','paid','overdue'].map(f => `
        <button class="filter-tab ${invoiceFilter===f?'active':''}" onclick="invoiceFilter='${f}';renderInvoices()">${f.charAt(0).toUpperCase()+f.slice(1)}</button>
      `).join('')}
    </div>
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search by number or client…" value="${esc(invoiceSearch)}" oninput="invoiceSearch=this.value;renderInvoices()">
      </div>
    </div>
    <div class="card">
      <div style="overflow-x:auto">
      ${filtered.length ? `
        <table class="data-table">
          <thead><tr>
            <th>Invoice No.</th><th>Client</th><th>Issue Date</th><th>Due Date</th><th>Period</th><th>Amount</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>
            ${filtered.map(inv => `
              <tr onclick="navigate('edit-invoice','${inv.id}')">
                <td style="font-weight:600;color:var(--gold)">${esc(inv.number)}</td>
                <td>${esc(inv.clientName||'—')}</td>
                <td>${fmtDate(inv.date)}</td>
                <td>${fmtDate(inv.dueDate)}</td>
                <td style="color:var(--muted);font-size:12px">${esc(inv.period||'')}</td>
                <td style="font-weight:600">${inv.currency} ${fmtNum(inv.total)}</td>
                <td>${statusBadge(inv.status, inv.dueDate)}</td>
                <td onclick="event.stopPropagation()">${invoiceActionMenu(inv)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-state"><div class="icon">◻</div><h3>No invoices found</h3><p>Adjust filters or create a new invoice</p></div>`}
      </div>
    </div>
  `;
}

function statusBadge(status, dueDate) {
  if (status === 'paid') return `<span class="badge badge-paid">✓ Paid</span>`;
  if (status === 'sent' && dueDate && dueDate < today()) return `<span class="badge badge-overdue">⚠ Overdue</span>`;
  if (status === 'sent') return `<span class="badge badge-sent">↗ Sent</span>`;
  return `<span class="badge badge-draft">✎ Draft</span>`;
}

function invoiceActionMenu(inv) {
  return `<div class="dropdown">
    <button class="btn btn-ghost btn-icon btn-sm" onclick="toggleDropdown('dd-${inv.id}',event)">⋯</button>
    <div class="dropdown-menu" id="dd-${inv.id}" style="display:none">
      <div class="dropdown-item" onclick="navigate('edit-invoice','${inv.id}')">✎ Edit</div>
      <div class="dropdown-item" onclick="printInvoice('${inv.id}')">⬇ Print / PDF</div>
      ${inv.status==='draft' ? `<div class="dropdown-item" onclick="markStatus('${inv.id}','sent');event.stopPropagation()">↗ Mark as Sent</div>` : ''}
      ${inv.status==='sent' ? `<div class="dropdown-item" onclick="markStatus('${inv.id}','paid');event.stopPropagation()">✓ Mark as Paid</div>` : ''}
      ${inv.status==='paid' ? `<div class="dropdown-item" onclick="markStatus('${inv.id}','sent');event.stopPropagation()">↩ Revert to Sent</div>` : ''}
      <div class="dropdown-item" onclick="duplicateInvoice('${inv.id}');event.stopPropagation()">⎘ Duplicate</div>
      <div class="dropdown-item danger" onclick="deleteInvoice('${inv.id}');event.stopPropagation()">✕ Delete</div>
    </div>
  </div>`;
}

function toggleDropdown(id, e) {
  e.stopPropagation();
  document.querySelectorAll('.dropdown-menu').forEach(m => { if(m.id !== id) m.style.display='none'; });
  const m = document.getElementById(id);
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display='none');
});

function markStatus(id, status) {
  const inv = DB.invoices.find(i => i.id === id);
  if (inv) { inv.status = status; DB.save(); toast(`Invoice marked as ${status}`, 'success'); renderView(); }
}
function deleteInvoice(id) {
  showConfirm('Delete Invoice?', 'This action cannot be undone.', () => {
    DB.invoices = DB.invoices.filter(i => i.id !== id);
    DB.save(); toast('Invoice deleted'); renderView();
  });
}
function duplicateInvoice(id) {
  const src = DB.invoices.find(i => i.id === id);
  if (!src) return;
  const dup = JSON.parse(JSON.stringify(src));
  dup.id = uid();
  dup.number = DB.nextInvoiceNumber();
  DB.incrementNumber();
  dup.status = 'draft';
  dup.date = today();
  dup.dueDate = addDays(today(), DB.settings.paymentTerms);
  DB.invoices.unshift(dup);
  DB.save();
  toast('Invoice duplicated', 'success');
  navigate('edit-invoice', dup.id);
}

// ═══════════════════════════════════════════════
// CLIENTS
// ═══════════════════════════════════════════════
let clientSearch = '';
function renderClients() {
  let list = DB.clients.filter(c => !clientSearch || c.name.toLowerCase().includes(clientSearch.toLowerCase()));

  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-gold" onclick="openClientModal()">＋ Add Client</button>
  `;

  document.getElementById('content-area').innerHTML = `
    <div class="search-bar">
      <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search clients…" value="${esc(clientSearch)}" oninput="clientSearch=this.value;renderClients()">
      </div>
    </div>
    <div class="card">
      <div style="overflow-x:auto">
      ${list.length ? `
        <table class="data-table">
          <thead><tr>
            <th>Company</th><th>Country</th><th>VAT ID</th><th>Contact</th><th>Invoices</th><th>Revenue</th><th></th>
          </tr></thead>
          <tbody>
            ${list.map(c => {
              const clientInv = DB.invoices.filter(i => i.clientId === c.id);
              const revenue = clientInv.filter(i=>i.status==='paid').reduce((s,i)=>s+i.total,0);
              return `<tr>
                <td style="font-weight:600">${esc(c.name)}</td>
                <td>${esc(c.country||'—')}</td>
                <td style="color:var(--muted);font-size:12px">${esc(c.vatId||'—')}</td>
                <td style="color:var(--muted);font-size:12px">${esc(c.email||'—')}</td>
                <td><span style="color:var(--gold);font-weight:600">${clientInv.length}</span></td>
                <td style="font-weight:600">EUR ${fmtNum(revenue)}</td>
                <td>
                  <div style="display:flex;gap:6px">
                    <button class="btn btn-sm btn-outline" onclick="openClientModal('${c.id}')">Edit</button>
                    <button class="btn btn-sm btn-ghost" onclick="newInvoiceForClient('${c.id}')">+ Invoice</button>
                    <button class="btn btn-sm btn-ghost" onclick="deleteClient('${c.id}')" style="color:var(--muted2)">✕</button>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-state"><div class="icon">◎</div><h3>No clients yet</h3><p>Add your first client to get started</p></div>`}
      </div>
    </div>
  `;
}

function openClientModal(id=null) {
  const c = id ? DB.clients.find(x => x.id === id) : null;
  const html = `
    <div class="modal-overlay" id="client-modal">
      <div class="modal modal-md">
        <div class="modal-header">
          <div class="modal-title">${c ? 'Edit Client' : 'New Client'}</div>
          <button class="btn btn-ghost btn-icon" onclick="closeModal('client-modal')">✕</button>
        </div>
        <div class="modal-body">
          <div class="field-row col2">
            <div class="field"><label>Company Name *</label><input id="c_name" value="${esc(c?.name||'')}"></div>
            <div class="field"><label>Country</label><input id="c_country" value="${esc(c?.country||'')}"></div>
          </div>
          <div class="field"><label>Street Address</label><input id="c_street" value="${esc(c?.street||'')}"></div>
          <div class="field-row col2">
            <div class="field"><label>ZIP / City</label><input id="c_city" value="${esc(c?.city||'')}"></div>
            <div class="field"><label>State / Region</label><input id="c_state" value="${esc(c?.state||'')}"></div>
          </div>
          <div class="divider"></div>
          <div class="field-row col2">
            <div class="field"><label>VAT ID</label><input id="c_vat" value="${esc(c?.vatId||'')}"></div>
            <div class="field"><label>Commercial Register (HRB)</label><input id="c_hrb" value="${esc(c?.hrb||'')}"></div>
          </div>
          <div class="field-row col2">
            <div class="field"><label>Contact Person</label><input id="c_contact" value="${esc(c?.contact||'')}"></div>
            <div class="field"><label>Email</label><input id="c_email" value="${esc(c?.email||'')}"></div>
          </div>
          <div class="field"><label>Notes</label><textarea id="c_notes">${esc(c?.notes||'')}</textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('client-modal')">Cancel</button>
          <button class="btn btn-gold" onclick="saveClient('${id||''}')">Save Client</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
}
function saveClient(id) {
  const name = document.getElementById('c_name').value.trim();
  if (!name) { toast('Company name required','error'); return; }
  const data = {
    id: id || uid(),
    name,
    country: document.getElementById('c_country').value,
    street: document.getElementById('c_street').value,
    city: document.getElementById('c_city').value,
    state: document.getElementById('c_state').value,
    vatId: document.getElementById('c_vat').value,
    hrb: document.getElementById('c_hrb').value,
    contact: document.getElementById('c_contact').value,
    email: document.getElementById('c_email').value,
    notes: document.getElementById('c_notes').value,
  };
  if (id) { const i = DB.clients.findIndex(c => c.id === id); if(i>=0) DB.clients[i] = data; }
  else DB.clients.push(data);
  DB.save();
  closeModal('client-modal');
  toast(id ? 'Client updated' : 'Client added', 'success');
  renderClients();
}
function deleteClient(id) {
  showConfirm('Delete Client?', 'All associated data will remain.', () => {
    DB.clients = DB.clients.filter(c => c.id !== id);
    DB.save(); toast('Client removed'); renderClients();
  });
}
function newInvoiceForClient(clientId) {
  editingClientId = clientId;
  navigate('new-invoice');
}
function closeModal(id) { document.getElementById(id)?.remove(); }

// ═══════════════════════════════════════════════
// INVOICE EDITOR
// ═══════════════════════════════════════════════
let editorState = null;

function initEditorState(id) {
  if (id) {
    const inv = DB.invoices.find(i => i.id === id);
    if (inv) { editorState = JSON.parse(JSON.stringify(inv)); return; }
  }
  const client = editingClientId ? DB.clients.find(c => c.id === editingClientId) : null;
  editingClientId = null;
  const dt = today();
  editorState = {
    id: uid(),
    number: DB.nextInvoiceNumber(),
    date: dt,
    dueDate: addDays(dt, DB.settings.paymentTerms),
    period: '',
    currency: DB.settings.defaultCurrency,
    status: 'draft',
    clientId: client?.id || '',
    clientName: client?.name || '',
    clientStreet: client?.street || '',
    clientCity: client?.city || '',
    clientCountry: client?.country || '',
    clientVatId: client?.vatId || '',
    clientHrb: client?.hrb || '',
    bankName: DB.settings.bankName,
    iban: DB.settings.iban,
    swift: DB.settings.swift,
    acceptedCurrencies: DB.settings.currencies,
    paymentTermsLabel: `${DB.settings.paymentTerms} days net`,
    vatRate: 0,
    vatNote: 'This invoice is issued without VAT. Tax liability is transferred to the recipient pursuant to Art. 196 EU VAT Directive 2006/112/EC and §13b UStG. The recipient must declare and remit VAT in Germany.',
    payNote: '',
    items: [
      { id: uid(), title: 'Strategic Consulting', desc: '', qty: '1 flat', rate: 0, amount: 0 }
    ],
    subtotal: 0,
    vatAmount: 0,
    total: 0
  };
}

function calcTotals() {
  editorState.subtotal = editorState.items.reduce((s, it) => s + (parseFloat(it.amount)||0), 0);
  editorState.vatAmount = editorState.subtotal * (parseFloat(editorState.vatRate)||0) / 100;
  editorState.total = editorState.subtotal + editorState.vatAmount;
}

function renderInvoiceEditor(id) {
  initEditorState(id);
  calcTotals();
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-outline btn-sm" onclick="saveInvoice('draft')">Save Draft</button>
    <button class="btn btn-outline btn-sm" onclick="saveInvoice('sent')">↗ Mark Sent</button>
    <button class="btn btn-gold btn-sm" onclick="printCurrentInvoice()">⬇ Print / PDF</button>
  `;
  buildEditorHTML();
}

function updatePreview() {
  calcTotals();
  const s = editorState;
  const cur = s.currency;
  // update totals mini
  const tm = document.querySelector('.totals-mini');
  if (tm) {
    tm.querySelector('.totals-row:nth-child(1) span:last-child').textContent = `${cur} ${fmtNum(s.subtotal)}`;
    tm.querySelector('.totals-row:nth-child(2) span:last-child').textContent = `${cur} ${fmtNum(s.vatAmount)}`;
    tm.querySelector('.totals-row.grand span:last-child').textContent = `${cur} ${fmtNum(s.total)}`;
  }
  const prev = document.getElementById('invoice-preview-doc');
  if (prev) prev.innerHTML = buildInvoiceHTML(s);
}

function autoCalcItem(i) {
  const it = editorState.items[i];
  const q = parseFloat(it.qty) || 1;
  it.amount = it.rate * q;
  const el = document.getElementById(`ed-amount-${i}`);
  if (el) el.value = it.amount;
  updatePreview();
}

function addEditorItem() {
  editorState.items.push({ id: uid(), title: 'New Service', desc: '', qty: '1 flat', rate: 0, amount: 0 });
  buildEditorHTML();
}

function removeEditorItem(i) {
  if (editorState.items.length <= 1) { toast('At least one item required','error'); return; }
  editorState.items.splice(i, 1);
  buildEditorHTML();
}

function fillClientFromSelect(clientId) {
  const c = DB.clients.find(x => x.id === clientId);
  if (!c) return;
  editorState.clientId = c.id;
  editorState.clientName = c.name;
  editorState.clientStreet = c.street || '';
  editorState.clientCity = c.city || '';
  editorState.clientCountry = c.country || '';
  editorState.clientVatId = c.vatId || '';
  editorState.clientHrb = c.hrb || '';
  buildEditorHTML();
}

function saveInvoice(status) {
  if (status) editorState.status = status;
  calcTotals();
  const existing = DB.invoices.findIndex(i => i.id === editorState.id);
  if (existing >= 0) DB.invoices[existing] = JSON.parse(JSON.stringify(editorState));
  else {
    DB.invoices.unshift(JSON.parse(JSON.stringify(editorState)));
    DB.incrementNumber();
  }
  DB.save();
  toast('Invoice saved ✓', 'success');
  updateBadges();
}

function printInvoice(id) {
  const inv = DB.invoices.find(i => i.id === id);
  if (!inv) return;

  printCurrentInvoice();
  editorState = tmpState;

function buildInvoiceHTML(s) {

  const rows = (s.items||[]).map((it, i) => `
    <tr>
      <td style="font-weight:600;white-space:nowrap">${String(i+1).padStart(2,'0')}</td>
      <td>${esc(it.title)}${it.desc ? `<small>${esc(it.desc)}</small>` : ''}</td>
      <td>${esc(it.qty)}</td>
      <td>${cur} ${fmtNum(it.rate)}</td>
      <td style="font-weight:600">${cur} ${fmtNum(it.amount)}</td>

  const settings = DB.settings;
  return `
    <div class="inv-hdr">
      <img src="${esc(logoUrl)}" class="inv-logo" alt="Logo" onerror="this.style.display='none'">
      <div class="inv-hdr-text">
        <h1>${esc(settings.companyName)}</h1>

      <div class="inv-hdr-info">
        <div><strong>Invoice No.</strong><span class="val">${esc(s.number)}</span></div>
        <div><strong>Date</strong><span class="val">${fmtDate(s.date)}</span></div>
        <div><strong>Due Date</strong><span class="val">${fmtDate(s.dueDate)}</span></div>
      </div>
    </div>
    <div class="inv-body">
      <div class="inv-addrs">
        <div class="inv-addr">
          <strong>From</strong>
          ${esc(settings.companyName)}<br>
          ${esc(settings.address).replace(/\n/g,'<br>')}<br>
          ${esc(settings.email)}<br>
          ${esc(settings.website)}<br>
          License No.: ${esc(settings.license)}<br>
          TRN: ${esc(settings.trn)}
        </div>
        <div class="inv-addr">
          <strong>To</strong>
          ${esc(s.clientName)}<br>
          ${esc(s.clientStreet)}<br>
          ${s.clientCity ? esc(s.clientCity) + (s.clientCountry ? ', ' + esc(s.clientCountry) : '') : ''}<br>
          ${s.clientVatId ? 'VAT ID: ' + esc(s.clientVatId) : ''}<br>
          ${esc(s.clientHrb||'')}

      <div class="inv-pay">

        ${esc(s.bankName)} &nbsp;·&nbsp; IBAN: ${esc(s.iban)} &nbsp;·&nbsp; SWIFT/BIC: ${esc(s.swift)}<br>

      <table>
        <thead>
          <tr>
            <th style="width:42px">Item</th>

      <table class="totals-tbl">

    </div>

      ${esc(settings.companyName)}-FZ &nbsp;·&nbsp; ${esc(settings.address).replace(/\n/g,' ')} &nbsp;·&nbsp;

      License No.: ${esc(settings.license)} &nbsp;·&nbsp; TRN: ${esc(settings.trn)}

  `;
}

function showConfirm(title, msg, onConfirm) {
  const id = 'confirm-' + uid();
  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="${id}">
      <div class="confirm-dialog">
        <h3>${esc(title)}</h3>
        <p>${esc(msg)}</p>
        <div class="actions">
          <button class="btn btn-outline" onclick="closeModal('${id}')">Cancel</button>
          <button class="btn btn-red" id="${id}-confirm">Delete</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById(`${id}-confirm`).addEventListener('click', () => {
    closeModal(id);
    onConfirm();
  });
}
